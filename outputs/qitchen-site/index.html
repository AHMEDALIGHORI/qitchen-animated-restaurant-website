<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Qitchen - Sushi Restaurant</title>
    <meta name="description" content="A dark editorial sushi restaurant website inspired by the Qitchen Framer template.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="site-shell home-layout">
      <section class="media-panel home-hero" aria-label="Qitchen sushi sensation">
        <header class="topbar">
          <button class="menu-toggle" type="button" aria-label="Open navigation" aria-expanded="false"><span></span></button>
          <a class="brand" href="./" aria-label="Qitchen home">QITCHEN</a>
          <nav class="nav-links" aria-label="Primary navigation">
            <a href="menu/">Menu</a>
            <a href="about/">About</a>
            <a class="book-link" href="reservation/">Book a Table</a>
          </nav>
        </header>
        <img src="assets/hero-sushi.png" alt="Sushi bowl with chopsticks on dark stone">
        <h1 class="headline">Sushi<br>Sensation</h1>
      </section>

      <aside class="tile-rail" aria-label="Featured sections">
        <a class="tile" href="menu/">
          <img src="assets/rolls-plated.png" alt="Chef presenting sushi rolls on a black plate">
          <span class="tile-label">Menu <span>-></span></span>
        </a>
        <a class="tile" href="reservation/">
          <img src="assets/reservation-table.png" alt="Fine dining table with wine glasses">
          <span class="tile-label">Reservation <span>-></span></span>
        </a>
        <a class="tile" href="about/">
          <img src="assets/restaurant-interior.png" alt="Modern sushi restaurant interior">
          <span class="tile-label">Our Story <span>-></span></span>
        </a>
      </aside>
    </main>

    <div class="social-dock" aria-label="Social links">
      <a href="#" aria-label="Qitchen profile">QT</a>
      <a href="#" aria-label="Instagram">IG</a>
      <a href="#" aria-label="Close">X</a>
    </div>
    <script src="script.js"></script>
  </body>
</html>
